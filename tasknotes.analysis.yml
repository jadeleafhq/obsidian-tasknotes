# tasknotes.analysis.yml — jlnotion.plugin-analyzer v1
# Generated: 2026-06-06

meta:
  plugin_id: tasknotes
  plugin_name: TaskNotes
  version: 4.10.2
  author: Callum Alpass
  min_app_version: "1.12.2"
  desktop_only: false
  loc_total: 276711
  loc_src_ts: 88958
  top_files_by_loc:
    - { file: e2e/tasknotes.spec.ts,                       loc: 9174 }
    - { file: src/bases/KanbanView.ts,                     loc: 4341 }
    - { file: src/api/TaskNotesAPI.ts,                     loc: 3433 }
    - { file: src/bases/CalendarView.ts,                   loc: 3089 }
    - { file: src/services/TaskCalendarSyncService.ts,     loc: 3048 }
    - { file: src/bases/TaskListView.ts,                   loc: 2898 }
  external_deps:
    - chrono-node        # NLP date parsing
    - date-fns           # date utilities
    - fullcalendar       # calendar UI
    - ical / node-ical   # ICS parsing
    - rrule              # RFC 5545 recurrence
    - yaml               # frontmatter parse/write
    - "@codemirror/*"    # editor extensions
    - obsidian-daily-notes-interface  # daily-notes integration
    - "@tasknotes/model" # external spec model (git submodule, NPM)
  key_source_dirs:
    - src/core/           # FieldMapper, VaultMutationService
    - src/services/       # TaskService, PomodoroService, ICSSubscriptionService, TaskCalendarSyncService…
    - src/services/task-service/  # planning modules (create, update, archive, time-tracking, recurrence)
    - src/utils/TaskManager.ts    # just-in-time cache (metadataCache-backed)
    - src/bases/          # KanbanView, CalendarView, TaskListView (Bases integration)
    - src/api/            # HTTP REST + MCP runtime API
    - src/bootstrap/      # service wiring + lifecycle

mechanics:
  entrypoints:
    - ribbon: calendar-days → activateCalendarView
    - ribbon: calendar → openBasesFileForCommand("open-advanced-calendar-view")
    - ribbon: check-square → openBasesFileForCommand("open-tasks-view")
    - ribbon: columns-3 → openBasesFileForCommand("open-kanban-view")
    - ribbon: timer → activatePomodoroView
    - ribbon: tasknotes-simple → openTaskCreationModal
    - commands: TranslatedCommandRegistry (create task, open views, etc.)
    - http_api: HTTPAPIService (localhost, configurable port) — TasksController, BasesController, etc.
    - mcp: runtime-api TASKNOTES_RUNTIME_LIFECYCLE_RAW_EVENTS
    - editor: CodeMirror extensions — TaskLinkOverlay, InstantConvertButtons, RelationshipsDecorations
    - markdown_post_processor: ReadingModeTaskLinkProcessor

  flow_task_create:
    trigger: modal / HTTP POST / inline-convert / CLI
    steps:
      1: TaskCreationService.create() — assemble TaskCreationData
      2: applyTaskCreationDefaults (status, priority, folder template)
      3: processTemplate → build YAML frontmatter + body
      4: vault.create(fullPath, content)   # ← file write
      5: TaskManager receives metadataCache "changed" event (debounced 300ms)
      6: emit EVENT_TASK_UPDATED + "data-changed"
      7: optional Google/Microsoft Calendar sync via TaskCalendarSyncService

  flow_task_update:
    trigger: modal save / direct frontmatter edit / HTTP PATCH / Bases drag-drop
    steps:
      1: TaskService.updateTask() / TaskUpdateService.run()
      2: build plan (property/archive/time-tracking/recurrence planning modules)
      3: fileManager.processFrontMatter(file, patchFn)   # ← atomic frontmatter patch
      4: optional vault.modify(file, newContent)          # body rewrite (e.g. recurrence reset)
      5: optional fileManager.renameFile (title/archive move)
      6: pendingTaskInfoByPath set (write-through cache — cleared when metadataCache confirms)
      7: emit EVENT_TASK_UPDATED

  flow_task_delete:
    steps:
      1: fileManager.trashFile(file)
      2: metadataCache "deleted" → handleFileDeleted → emit "file-deleted" + "data-changed"

  flow_task_read:
    authority: TaskManager.getTaskInfo(path)
    resolution_order:
      1: pendingTaskInfoByPath (write-ahead buffer — in-memory Map)
      2: metadataCache.getFileCache(file).frontmatter   # primary path
      3: vault.read(file) YAML parse (fallback if cache not ready)
    note: No SQLite, no secondary DB — metadataCache IS the index

  flow_pomodoro:
    storage: plugin.loadData() / plugin.saveData()   # data.json
    note: Optionally writes pomodoro session history to daily-note frontmatter (processFrontMatter)

  flow_ics:
    storage: plugin.loadData() / plugin.saveData()   # ICSCache in data.json
    note: Subscriptions (remote URL or local file) cached in-memory Map<subscriptionId, ICSCache>

  flow_google_calendar_sync:
    trigger: task create/update/delete events (configurable)
    storage: googleCalendarEventId / googleCalendarExceptionEventId in task frontmatter
    recovery_queue: pendingGoogleCalendarSync / pendingGoogleCalendarDeletion in data.json

  flow_saved_views:
    storage: data.json (ViewStateManager.saveSavedViews)

  task_shape:
    identity: path (TFile.path)  # ← D1: path-as-identity; no surrogate ID
    frontmatter_fields: |
      title, status, priority, due (YYYY-MM-DD), scheduled (YYYY-MM-DD),
      tags[], contexts[], projects[], recurrence (RFC 5545), recurrence_anchor,
      complete_instances[], skipped_instances[], recurrence_parent,
      occurrence_date, occurrence_materialization, occurrence_next_trigger,
      occurrence_template, occurrence_past_horizon, occurrence_future_horizon,
      completedDate, timeEstimate (minutes), timeEntries[{startTime,endTime,description}],
      dateCreated (ISO), dateModified (ISO),
      blockedBy[{uid,reltype,gap}], sortOrder (LexoRank),
      reminders[{id,type,relatedTo,offset,absoluteTime}],
      googleCalendarEventId, googleCalendarExceptionEventId,
      googleCalendarMovedOriginalDates, googleCalendarExceptionOriginalScheduled,
      icsEventId[]
    field_mapping: user-configurable via FieldMapping (all keys remappable)
    identification_method: tag (default "task") OR property (configurable key+value)

  timeblock_shape:
    location: daily-note frontmatter (timeblocks: TimeBlock[])
    fields: id, title, startTime (HH:MM), endTime (HH:MM), attachments[], color, description

  pomodoro_shape:
    location: data.json (key: pomodoroHistory) OR daily-note frontmatter (pomodoros key)
    fields: PomodoroSession/PomodoroSessionHistory (id, taskPath, startTime, endTime, type, completed, activePeriods[])

  ics_shape:
    location: data.json (key: icsCaches)
    fields: ICSCache{subscriptionId, events[ICSEvent{id,subscriptionId,title,start,end,allDay,rrule}], lastUpdated, expires}

  saved_views_shape:
    location: data.json
    fields: SavedView{id, name, query: FilterQuery{sortKey,sortDirection,groupKey,children:FilterNode[]}}

defects:
  D1:
    title: Path-as-identity
    detail: >
      TaskInfo.id is set to file.path (TaskManager line 200, 313).
      On rename, pendingTaskInfoByPath re-keys by newPath but all existing
      cross-references (blockedBy.uid, projects[], recurrence_parent) remain as the old
      wikilink or markdown-link string. metadataCache-based resolvers may or may not
      follow renames depending on Obsidian's link-update setting.
    scope: creates + reads; blockedBy.uid resolution; recurrence_parent
    fix: use blocks.id FK from jlnotion; resolve path via join at read time

  D2:
    title: Write-echo risk on processFrontMatter
    detail: >
      TaskService calls fileManager.processFrontMatter in ~8 places. This fires
      metadataCache "changed", which triggers TaskManager.handleFileChangedDebounced.
      pendingTaskInfoByPath provides a write-through buffer to suppress stale reads
      (shouldUsePendingTaskInfo checks dateModified mismatch), but the event still
      propagates through "data-changed" and re-renders all views.
      Debounce is 300ms — rapid successive writes (recurrence + title + archive) can
      queue multiple render cycles.
    scope: TaskService, TaskUpdateService, KanbanView (direct processFrontMatter call line 3728)
    fix: jlnotion WriteGuard must mark paths in-flight; suppress "data-changed" re-broadcast
         until pendingTaskInfoByPath is cleared

  D3:
    title: data.json conflates heterogeneous state
    detail: >
      Pomodoro history, ICS cache, OAuth tokens, saved views, auto-archive queue,
      Google Calendar recovery queues, and settings all share data.json via
      plugin.loadData() / saveData(). Concurrent load/mutate/save sequences are
      not guarded by a lock — e.g., AutoArchiveService, OAuthService, PomodoroService
      each do independent read-modify-write cycles.
    scope: AutoArchiveService, OAuthService, PomodoroService, ICSSubscriptionService, ViewStateManager
    fix: extract each domain into a dedicated scoped key with optimistic-lock (ETag/version);
         jlnotion maps each to a separate table/scope

  D4:
    title: LexoRank sortOrder stored as string in frontmatter
    detail: >
      KanbanView writes `sortOrder` (LexoRank string) into task frontmatter.
      This is a render-order concern, not task identity. It bloats frontmatter and
      triggers D2 re-render on every drag-drop.
    fix: render_only column in cache; not written to vault files

  D5:
    title: timeEntries[] grows unbounded in frontmatter
    detail: >
      Each time-tracking start/stop appends a TimeEntry to the timeEntries array in
      frontmatter. Large task files accumulate many entries with no pruning/archival.
    fix: separate time_entries table in cache; frontmatter stores only active entry + total

  D6:
    title: googleCalendarMovedOriginalDates array grows unbounded in frontmatter
    detail: >
      Moved recurring event original dates are appended to frontmatter array with no
      expiry/pruning. Purely a recovery hint for GCal sync.
    fix: out_of_db_scope or a separate gcal_recovery_queue table; not in main task row

