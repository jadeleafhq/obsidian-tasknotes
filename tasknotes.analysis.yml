sqlite_abstraction:
  note: >
    All tables are CACHE PROJECTIONS of vault files.
    writes_go_to_files: true  |  rebuildable: true  |  no_fts5: true
    Search = LIKE/GLOB on text columns. render_only columns not written back to vault.

  tables:

    - name: tasks
      note: one row per task file; PK = blocks.id FK; path via join
      columns:
        - { name: id,                    type: TEXT NOT NULL,      note: FK -> blocks.id }
        - { name: title,                 type: TEXT NOT NULL }
        - { name: status,                type: TEXT NOT NULL }
        - { name: priority,              type: TEXT NOT NULL }
        - { name: due,                   type: TEXT,               note: YYYY-MM-DD }
        - { name: scheduled,             type: TEXT,               note: YYYY-MM-DD }
        - { name: completed_date,        type: TEXT,               note: YYYY-MM-DD }
        - { name: date_created,          type: TEXT,               note: ISO timestamp }
        - { name: date_modified,         type: TEXT,               note: ISO timestamp }
        - { name: archived,              type: INTEGER NOT NULL DEFAULT 0 }
        - { name: recurrence,            type: TEXT,               note: RFC 5545 RRULE string }
        - { name: recurrence_anchor,     type: TEXT,               note: "'scheduled'|'completion'" }
        - { name: recurrence_parent_id,  type: TEXT,               note: FK -> tasks.id (NULL if not occurrence) }
        - { name: occurrence_date,       type: TEXT,               note: YYYY-MM-DD; materialized only }
        - { name: occurrence_materialization, type: TEXT }
        - { name: occurrence_next_trigger,    type: TEXT }
        - { name: time_estimate,         type: INTEGER,            note: minutes }
        - { name: total_tracked_time,    type: INTEGER,            render_only: true, note: derived from time_entries }
        - { name: sort_order,            type: TEXT,               render_only: true, note: LexoRank; D4 }
        - { name: is_blocked,            type: INTEGER,            render_only: true, note: derived from blocked_by + status }
        - { name: is_blocking,           type: INTEGER,            render_only: true, note: derived from blocking }
        - { name: has_subtasks,          type: INTEGER,            render_only: true, note: derived from projects backref }
        - { name: details,               type: TEXT,               note: task body (non-frontmatter content) }
      constraints:
        - "PK(id)"
        - "FK(id) REFERENCES blocks(id) ON UPDATE CASCADE"
        - "FK(recurrence_parent_id) REFERENCES tasks(id)"

    - name: task_tags
      note: normalized tags[], contexts[], projects[] arrays
      columns:
        - { name: task_id,  type: TEXT NOT NULL, note: FK -> tasks.id }
        - { name: kind,     type: TEXT NOT NULL, note: "'tag'|'context'|'project'" }
        - { name: value,    type: TEXT NOT NULL }
      constraints:
        - "PK(task_id, kind, value)"

    - name: task_complete_instances
      note: complete_instances[] and skipped_instances[] for recurring tasks
      columns:
        - { name: task_id,  type: TEXT NOT NULL,  note: FK -> tasks.id (parent recurring task) }
        - { name: date,     type: TEXT NOT NULL,  note: YYYY-MM-DD }
        - { name: kind,     type: TEXT NOT NULL,  note: "'completed'|'skipped'" }
      constraints:
        - "PK(task_id, date, kind)"

    - name: task_time_entries
      note: normalized timeEntries[] (D5 fix)
      columns:
        - { name: id,          type: TEXT NOT NULL,  note: surrogate uuid }
        - { name: task_id,     type: TEXT NOT NULL,  note: FK -> tasks.id }
        - { name: start_time,  type: TEXT NOT NULL,  note: ISO timestamp }
        - { name: end_time,    type: TEXT,           note: NULL if running }
        - { name: description, type: TEXT }
        - { name: duration,    type: INTEGER,        render_only: true, note: derived seconds; legacy compat }
        - { name: ord,         type: INTEGER NOT NULL }
      constraints:
        - "PK(id)"
        - "FK(task_id) REFERENCES tasks(id) ON DELETE CASCADE"

    - name: task_reminders
      note: normalized reminders[]
      columns:
        - { name: id,             type: TEXT NOT NULL }
        - { name: task_id,        type: TEXT NOT NULL,  note: FK -> tasks.id }
        - { name: type,           type: TEXT NOT NULL,  note: "'absolute'|'relative'" }
        - { name: related_to,     type: TEXT,           note: "'due'|'scheduled'" }
        - { name: offset,         type: TEXT,           note: ISO 8601 duration }
        - { name: absolute_time,  type: TEXT,           note: ISO timestamp }
        - { name: description,    type: TEXT }
      constraints:
        - "PK(id)"
        - "FK(task_id) REFERENCES tasks(id) ON DELETE CASCADE"

    - name: task_blocked_by
      note: normalized blockedBy[] (separate from backlinks and canvas edges — D1/layer invariant)
      columns:
        - { name: task_id,   type: TEXT NOT NULL,  note: FK -> tasks.id (the blocked task) }
        - { name: uid,       type: TEXT NOT NULL,  note: wikilink/path of blocking task }
        - { name: reltype,   type: TEXT NOT NULL,  note: FINISHTOSTART|FINISHTOFINISH|STARTTOSTART|STARTTOFINISH }
        - { name: gap,       type: TEXT,           note: ISO 8601 duration }
      constraints:
        - "PK(task_id, uid)"
        - "FK(task_id) REFERENCES tasks(id) ON DELETE CASCADE"

    - name: timeblocks
      note: TimeBlock[] from daily-note frontmatter; FK to daily note blocks.id
      columns:
        - { name: id,          type: TEXT NOT NULL }
        - { name: daily_id,    type: TEXT NOT NULL,  note: FK -> blocks.id of daily note }
        - { name: title,       type: TEXT NOT NULL }
        - { name: start_time,  type: TEXT NOT NULL,  note: HH:MM }
        - { name: end_time,    type: TEXT NOT NULL,  note: HH:MM }
        - { name: color,       type: TEXT }
        - { name: description, type: TEXT }
      constraints:
        - "PK(id)"
        - "FK(daily_id) REFERENCES blocks(id)"

    - name: timeblock_attachments
      note: normalized attachments[] (markdown links to tasks/notes)
      columns:
        - { name: timeblock_id,  type: TEXT NOT NULL }
        - { name: link,          type: TEXT NOT NULL }
        - { name: ord,           type: INTEGER NOT NULL }
      constraints:
        - "PK(timeblock_id, ord)"

    - name: pomodoro_sessions
      note: extracted from data.json pomodoroHistory (D3 fix)
      columns:
        - { name: id,               type: TEXT NOT NULL }
        - { name: task_id,          type: TEXT,           note: FK -> tasks.id (nullable) }
        - { name: start_time,       type: TEXT NOT NULL,  note: ISO timestamp }
        - { name: end_time,         type: TEXT,           note: ISO timestamp }
        - { name: planned_duration, type: INTEGER NOT NULL, note: minutes }
        - { name: type,             type: TEXT NOT NULL,  note: "'work'|'short-break'|'long-break'" }
        - { name: completed,        type: INTEGER NOT NULL }
        - { name: interrupted,      type: INTEGER }
      constraints:
        - "PK(id)"
        - "FK(task_id) REFERENCES tasks(id) ON DELETE SET NULL"

    - name: pomodoro_active_periods
      note: PomodoroTimePeriod[] for pause/resume tracking
      columns:
        - { name: session_id,  type: TEXT NOT NULL }
        - { name: start_time,  type: TEXT NOT NULL }
        - { name: end_time,    type: TEXT }
        - { name: ord,         type: INTEGER NOT NULL }
      constraints:
        - "PK(session_id, ord)"

    - name: ics_subscriptions
      note: ICSSubscription config; out_of_db_scope settings fields excluded
      columns:
        - { name: id,              type: TEXT NOT NULL }
        - { name: name,            type: TEXT NOT NULL }
        - { name: url,             type: TEXT }
        - { name: file_path,       type: TEXT }
        - { name: type,            type: TEXT NOT NULL,  note: "'remote'|'local'" }
        - { name: color,           type: TEXT NOT NULL }
        - { name: enabled,         type: INTEGER NOT NULL }
        - { name: refresh_interval,type: INTEGER NOT NULL, note: minutes }
      constraints:
        - "PK(id)"

    - name: ics_events
      note: ICSEvent from ICSCache; cache projection of remote/local ICS data
      columns:
        - { name: id,                  type: TEXT NOT NULL }
        - { name: subscription_id,     type: TEXT NOT NULL,  note: FK -> ics_subscriptions.id }
        - { name: title,               type: TEXT NOT NULL }
        - { name: description,         type: TEXT }
        - { name: start,               type: TEXT NOT NULL,  note: ISO timestamp }
        - { name: end,                 type: TEXT }
        - { name: all_day,             type: INTEGER NOT NULL }
        - { name: location,            type: TEXT }
        - { name: url,                 type: TEXT }
        - { name: rrule,               type: TEXT }
        - { name: recurring_event_id,  type: TEXT }
        - { name: color,               type: TEXT }
        - { name: last_updated,        type: TEXT NOT NULL,  note: ISO timestamp }
        - { name: expires,             type: TEXT NOT NULL,  note: ISO timestamp }
      constraints:
        - "PK(id, subscription_id)"
        - "FK(subscription_id) REFERENCES ics_subscriptions(id) ON DELETE CASCADE"

    - name: saved_views
      note: extracted from data.json (D3 fix); serialized FilterQuery as JSON blob
      columns:
        - { name: id,                  type: TEXT NOT NULL }
        - { name: name,                type: TEXT NOT NULL }
        - { name: query_json,          type: TEXT NOT NULL,  note: JSON-serialized FilterQuery }
        - { name: view_options_json,   type: TEXT }
        - { name: visible_properties,  type: TEXT,           note: JSON array of property IDs }
      constraints:
        - "PK(id)"

  derivation_sql_sketch:
    note: illustrative — not executed by plugin; for indexer reference

    total_tracked_time: |
      -- render_only column; recomputed on rebuild
      UPDATE tasks SET total_tracked_time = (
        SELECT COALESCE(SUM(
          CAST((julianday(COALESCE(end_time, datetime('now'))) - julianday(start_time)) * 1440 AS INTEGER)
        ), 0)
        FROM task_time_entries WHERE task_id = tasks.id
      );

    is_blocked: |
      -- render_only; requires status join; CONFLICT(D1) — uid must resolve to tasks.id
      UPDATE tasks SET is_blocked = (
        SELECT CASE WHEN COUNT(*) > 0 THEN 1 ELSE 0 END
        FROM task_blocked_by tb
        JOIN tasks blocker ON blocker.id = tb.uid  -- uid = path; join via blocks.id
        JOIN tasks self ON self.id = tb.task_id
        WHERE tb.task_id = tasks.id
          AND blocker.status NOT IN (SELECT value FROM status_config WHERE is_completed = 1)
      );

    recurrence_next_due: |
      -- procedural_transform; rrule expansion not SQL-native; record as derivation sketch only
      -- indexer must call rrule.after(lastCompleted) in JS, store result in tasks.due on rebuild

compatibility:
  obsidian_api:
    metadataCache_changed: COMPATIBLE
    fileManager_processFrontMatter: COMPATIBLE
    vault_create_modify: COMPATIBLE
    vault_rename: COMPATIBLE
    registerEditorExtension_codemirror: COMPATIBLE
    registerMarkdownPostProcessor: COMPATIBLE
    obsidian_daily_notes_interface: COMPATIBLE  # external dep, not core API

  jl_notion_invariants:
    writes_to_files:
      score: COMPATIBLE
      note: All task mutations via fileManager.processFrontMatter or vault.create/modify.
            Exception: data.json (pomodoro, ICS, OAuth, saved views, auto-archive queue) — see D3.

    db_is_read_cache:
      score: COMPATIBLE
      note: TaskManager explicitly documented as "just-in-time, no internal cache".
            pendingTaskInfoByPath is a transient write-ahead buffer, not authoritative state.
            data.json state (D3) is out_of_db_scope except pomodoro/ICS/saved_views which
            must be promoted to proper tables.

    blocks_id_identity:
      score: "CONFLICT(D1)"
      note: TaskInfo.id = file.path throughout. No surrogate ID.
            Fix: wrap in FK -> blocks.id at indexer boundary; all cross-refs resolve via path join.

    global_property_registry:
      score: COMPATIBLE
      note: FieldMapping is vault-global; UserMappedField[] is plugin-wide config.
            Per-file overrides do not exist. Consistent with jlnotion global property registry.

    separate_link_layers:
      score: COMPATIBLE
      note: blockedBy[] (task_blocked_by table), backlinks (Obsidian native), and
            canvas edges are explicitly NOT conflated in the type model. Dependency
            link layer is its own typed array with reltype + gap.

    render_only_geometry:
      score: COMPATIBLE
      note: sortOrder (LexoRank) is the only geometry-like field; treated as D4 and
            flagged render_only. timeblocks startTime/endTime are data, not render geometry.

    no_fts5:
      score: COMPATIBLE
      note: Plugin uses metadataCache (not FTS) for text search. FilterOperators
            "contains"/"does-not-contain" map to LIKE-scan on text columns.

  writeguard_required: true
  writeguard_triggers:
